<!DOCTYPE html>
<html lang="pt-br" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grupo | Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { 
            color: #ededed; font-family: 'Inter', sans-serif;
            background-color: #050505;
            background-image: radial-gradient(circle at 50% 0%, #102a43 0%, #050505 70%);
            background-attachment: fixed;
        }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .amazon-orange { color: #ff9900; }
        .bg-amazon-orange { background-color: #ff9900; }
        .amazon-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .amazon-card:hover { transform: translateY(-5px); border-color: rgba(8, 145, 178, 0.4); box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen overflow-x-hidden">

    <header class="fixed top-0 left-0 w-full z-50 glass-panel bg-[#050505]/90 border-b border-white/10">
        <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between gap-4">
            <a href="#" class="text-xl font-bold tracking-tighter">Sandx<span class="amazon-orange">CDD</span></a>
            
            <div class="hidden md:flex flex-col text-xs leading-tight">
                <span class="text-gray-400">Enviar para</span>
                <span id="loc-display" class="font-bold"><i class="fas fa-map-marker-alt"></i> Brasilia - DF</span>
            </div>

            <div class="flex-1 max-w-2xl relative">
                <div class="flex">
                    <input type="text" id="mainSearch" onkeyup="filtrarProdutos()" placeholder="Buscar produtos, ferramentas ou logística..." 
                    class="w-full bg-white text-black px-4 py-2 rounded-l-md outline-none focus:ring-2 focus:ring-orange-500">
                    <button class="bg-amazon-orange px-5 rounded-r-md hover:bg-orange-600 transition">
                        <i class="fas fa-search text-navy-900"></i>
                    </button>
                </div>
                <div id="search-feedback" class="absolute top-12 left-0 w-full text-xs text-cyan-400 font-mono"></div>
            </div>

            <div class="flex items-center gap-6">
                <button onclick="toggleCarrinho()" class="relative flex items-center gap-2 hover:text-orange-400 transition">
                    <i class="fas fa-shopping-cart text-2xl"></i>
                    <span id="cart-count" class="absolute -top-2 -right-2 bg-orange-600 text-white text-[10px] font-bold px-2 py-0.5 rounded-full">0</span>
                    <span class="hidden md:inline font-bold">Carrinho</span>
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 mt-24 pb-20">
        <div id="rtk-status" class="glass-panel p-3 rounded-lg mb-8 border-cyan-500/30 flex items-center justify-between text-xs md:text-sm">
            <div class="flex items-center gap-3">
                <div class="relative w-3 h-3">
                    <div class="absolute inset-0 bg-green-500 rounded-full animate-ping"></div>
                    <div class="relative bg-green-500 w-3 h-3 rounded-full"></div>
                </div>
                <span class="font-mono text-cyan-400 tracking-widest uppercase">Sinal RTK Ativo</span>
            </div>
            <div class="text-gray-400" id="geo-info">Calculando</div>
        </div>

        <div id="productGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
            </div>
    </main>

    <div id="painel-carrinho" class="fixed top-0 right-0 w-full sm:w-[450px] h-full glass-panel bg-[#050505]/98 z-[100] transform translate-x-full transition-transform duration-300 flex flex-col border-l border-white/10 shadow-2xl">
        <div class="p-6 border-b border-white/10 flex justify-between items-center">
            <h2 class="text-xl font-bold uppercase italic tracking-tighter">Sua <span class="amazon-orange">Sacola</span></h2>
            <button onclick="toggleCarrinho()" class="text-gray-400 hover:text-white p-2"><i class="fas fa-times text-xl"></i></button>
        </div>

        <div id="itens-carrinho" class="flex-1 overflow-y-auto p-4 space-y-4 no-scrollbar">
            </div>

        <div class="p-6 bg-black/60 border-t border-white/10 space-y-4">
            <div id="checkout-detalhado" class="p-4 space-y-3 bg-white/5 rounded-xl border border-white/5">
                <p class="text-[10px] text-cyan-400 uppercase tracking-widest font-bold mb-2">Dados de Faturamento</p>
                <input type="text" id="cli-nome" placeholder="Nome Completo" class="w-full bg-black/40 border border-white/10 rounded-lg p-2 text-sm outline-none focus:border-orange-500 transition">
                <div class="flex gap-2">
                    <input type="email" id="cli-email" placeholder="E-mail" class="w-1/2 bg-black/40 border border-white/10 rounded-lg p-2 text-sm outline-none">
                    <input type="tel" id="cli-whats" placeholder="WhatsApp" class="w-1/2 bg-black/40 border border-white/10 rounded-lg p-2 text-sm outline-none">
                </div>
                <div class="flex gap-2">
                    <input type="text" id="cli-cep" onkeyup="buscarCEP_Completo(this.value)" placeholder="CEP" maxlength="9" class="w-1/3 bg-white/10 border border-cyan-500/30 rounded-lg p-2 text-sm text-cyan-400 font-bold outline-none">
                    <input type="text" id="cli-rua" placeholder="Endereço Completo" class="w-2/3 bg-black/20 border border-white/10 rounded-lg p-2 text-[10px] text-gray-400" readonly>
                </div>
                <div id="status-mapa" class="hidden text-[9px] bg-green-500/10 text-green-400 p-2 rounded border border-green-500/20 items-center gap-2">
                    <i class="fas fa-street-view"></i> Localização validada via Google Street View
                </div>
            </div>

            <div class="space-y-2">
                <p class="text-[10px] text-gray-400 uppercase tracking-widest font-bold ml-1">Forma de Pagamento</p>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="selecionarPag('Pix')" id="btn-pag-pix" class="flex items-center justify-center gap-2 p-3 rounded-xl border border-white/10 bg-white/5 hover:border-green-500 transition-all">
                        <i class="fab fa-pix text-green-400"></i> <span class="text-[10px] font-bold">PIX</span>
                    </button>
                    <button onclick="selecionarPag('Cartao')" id="btn-pag-card" class="flex items-center justify-center gap-2 p-3 rounded-xl border border-white/10 bg-white/5 hover:border-blue-500 transition-all">
                        <i class="fas fa-credit-card text-blue-400"></i> <span class="text-[10px] font-bold">CARTÃO</span>
                    </button>
                </div>
            </div>

            <div class="flex justify-between font-bold text-lg pt-2 border-t border-white/5">
                <span class="text-sm">Total do Pedido:</span>
                <span id="total-carrinho" class="text-orange-400 font-black">R$ 0,00</span>
            </div>

            <button onclick="finalizarParaVendedor()" class="w-full bg-amazon-orange text-black font-extrabold py-4 rounded-lg hover:bg-orange-500 transition uppercase shadow-lg shadow-orange-500/20">
                Finalizar via Telegram
            </button>
        </div>
    </div>

    <script>
        const db_estoque = [
            { id: 101, nome: "Parafuso Sextavado Aço 8.8", preco: 145.90, img: "https://via.placeholder.com/200", loja: "Atacadão Ferragens" },
            { id: 102, nome: "Dashboard Performance SandxCDD", preco: 597.00, img: "https://via.placeholder.com/200", loja: "Digital Solutions" },
            { id: 103, nome: "Kit Brocas Profissional", preco: 89.90, img: "https://via.placeholder.com/200", loja: "Loja Parceira" }
        ];

        let sacola = [];
        let metodoSelecionado = "";
        let fecharTimer;

        function renderizar(lista) {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = lista.map(p => `
                <div class="amazon-card glass-panel rounded-lg overflow-hidden flex flex-col">
                    <div class="bg-white h-48 flex items-center justify-center">
                        <img src="${p.img}" class="max-h-40 mix-blend-multiply">
                    </div>
                    <div class="p-4 flex-1 flex flex-col">
                        <p class="text-[10px] text-cyan-400 font-mono uppercase">${p.loja}</p>
                        <h3 class="font-bold text-sm h-10 overflow-hidden mb-2">${p.nome}</h3>
                        <div class="text-xl font-bold mb-4">R$ ${p.preco.toLocaleString('pt-br', {minimumFractionDigits: 2})}</div>
                        <button onclick="addSacola(${p.id})" class="mt-auto bg-amazon-orange text-black font-bold py-2 rounded text-xs hover:bg-orange-500 transition">
                            Adicionar ao Carrinho
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // ADICIONAR E AUTO-CONTROLE DA SACOLA
        function addSacola(id) {
            const item = db_estoque.find(p => p.id === id);
            sacola.push(item);
            atualizarCarrinho();
            
            // Abre automático
            const painel = document.getElementById('painel-carrinho');
            painel.classList.remove('translate-x-full');
            
            // Fecha automático após 3 segundos
            clearTimeout(fecharTimer);
            fecharTimer = setTimeout(() => {
                painel.classList.add('translate-x-full');
            }, 3000);
        }

        // BUSCADOR AUTOMÁTICO DE CEP
        async function buscarCEP_Completo(cep) {
            cep = cep.replace(/\D/g, '');
            if (cep.length === 8) {
                try {
                    const res = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
                    const data = await res.json();
                    if (!data.erro) {
                        document.getElementById('cli-rua').value = `${data.logradouro}, ${data.bairro} - ${data.localidade}/${data.uf}`;
                        document.getElementById('status-mapa').classList.remove('hidden');
                        document.getElementById('status-mapa').classList.add('flex');
                    }
                } catch (e) { console.error("Busca falhou"); }
            }
        }

        function selecionarPag(metodo) {
            metodoSelecionado = metodo;
            const bPix = document.getElementById('btn-pag-pix');
            const bCard = document.getElementById('btn-pag-card');
            
            bPix.className = bCard.className = "flex items-center justify-center gap-2 p-3 rounded-xl border border-white/10 bg-white/5 transition-all";
            
            if(metodo === 'Pix') bPix.classList.add('border-green-500', 'bg-green-500/10', 'ring-1', 'ring-green-500');
            else bCard.classList.add('border-blue-500', 'bg-blue-500/10', 'ring-1', 'ring-blue-500');
        }

        function atualizarCarrinho() {
            document.getElementById('cart-count').innerText = sacola.length;
            const container = document.getElementById('itens-carrinho');
            let total = 0;
            container.innerHTML = sacola.map(item => {
                total += item.preco;
                return `<div class="flex gap-4 border-b border-white/5 pb-3 items-center">
                    <img src="${item.img}" class="w-10 h-10 bg-white rounded">
                    <div class="flex-1 text-xs font-bold">${item.nome}</div>
                    <div class="text-orange-400 text-xs font-bold">R$ ${item.preco.toFixed(2)}</div>
                </div>`;
            }).join('');
            document.getElementById('total-carrinho').innerText = `R$ ${total.toLocaleString('pt-br', {minimumFractionDigits: 2})}`;
        }

        function toggleCarrinho() {
            document.getElementById('painel-carrinho').classList.toggle('translate-x-full');
        }

        function filtrarProdutos() {
            const query = document.getElementById('mainSearch').value.toLowerCase();
            const feedback = document.getElementById('search-feedback');
            feedback.innerText = query ? `Buscando: "${query}"` : "";
            renderizar(db_estoque.filter(p => p.nome.toLowerCase().includes(query)));
        }

        function finalizarParaVendedor() {
            const nome = document.getElementById('cli-nome').value;
            const whats = document.getElementById('cli-whats').value;
            if(!nome || !whats || !metodoSelecionado || sacola.length === 0) {
                return alert("Preencha todos os dados e escolha o pagamento!");
            }
            
            const msg = `🚀 *PEDIDO👤 *Cliente:* ${nome}%0A📱 *Whats:* ${whats}%0A📍 *Entrega:* ${document.getElementById('cli-rua').value}%0A💰 *Total:* ${document.getElementById('total-carrinho').innerText}%0A💳 *Pagamento:* ${metodoSelecionado}`;
            window.open(`https://t.me/SEU_BOT_AQUI?text=${msg}`);
        }

        renderizar(db_estoque);
    </script>
</body>
</html>
