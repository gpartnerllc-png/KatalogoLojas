<!DOCTYPE html>
<html lang="pt-br" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grupo | Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body { 
            color: #ededed; font-family: 'Inter', sans-serif;
            background-color: #050505;
            background-image: radial-gradient(circle at 50% 0%, #102a43 0%, #050505 70%);
            background-attachment: fixed;
            -webkit-user-select: none; user-select: none;
            overflow-x: hidden;
        }

        /* Bloqueio de Seleção Militar */
        * { -webkit-user-select: none !important; -moz-user-select: none !important; -ms-user-select: none !important; user-select: none !important; -webkit-touch-callout: none !important; }
        input, textarea { -webkit-user-select: auto !important; user-select: auto !important; }

        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .amazon-orange { color: #ff9900; }
        .bg-amazon-orange { background-color: #ff9900; }
        
        .amazon-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); animation: fadeIn 0.5s ease-out; }
        .amazon-card:hover { transform: translateY(-5px); border-color: rgba(8, 145, 178, 0.4); }
        
        /* Guia Lateral da Sacola quando fechada */
        #cart-handle {
            position: fixed; right: 0; top: 50%; transform: translateY(-50%);
            background: #ff9900; color: black; padding: 15px 8px;
            border-radius: 10px 0 0 10px; cursor: pointer; z-index: 90;
            writing-mode: vertical-rl; font-weight: 900; font-size: 10px;
            letter-spacing: 2px; box-shadow: -5px 0 20px rgba(0,0,0,0.5);
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        #btn-finalizar { position: relative; overflow: hidden; }
        #btn-finalizar::after {
            content: ""; position: absolute; top: -50%; left: -100%; width: 100%; height: 200%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transform: rotate(20deg); animation: shine 4s infinite;
        }
        @keyframes shine { 0% { left: -100%; } 20% { left: 100%; } 100% { left: 100%; } }

        @media print { body { display:none !important; } }
    </style>
</head>
<body class="min-h-screen">

    <header class="fixed top-0 left-0 w-full z-50 glass-panel bg-[#050505]/90 border-b border-white/10">
        <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between gap-4">
            <a href="#" class="text-xl font-bold tracking-tighter">GRUPO<span class="amazon-orange">APOIO</span></a>
            <div class="flex-1 max-w-2xl relative">
                <div class="flex">
                    <input type="text" id="mainSearch" onkeyup="filtrarProdutos()" placeholder="Buscar produtos ou ferramentas..." 
                    class="w-full bg-white text-black px-4 py-2 rounded-l-md outline-none">
                    <button class="bg-amazon-orange px-5 rounded-r-md"><i class="fas fa-search"></i></button>
                </div>
            </div>
            <div id="loc-display" class="hidden md:block text-[10px] text-cyan-400 font-mono italic">Sincronizando...</div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 mt-24 pb-10">
        <div class="glass-panel p-3 rounded-lg mb-8 border-cyan-500/30 flex items-center justify-between text-xs">
            <div class="flex items-center gap-3">
                <div class="relative w-2 h-2"><div class="absolute inset-0 bg-green-500 rounded-full animate-ping"></div><div class="relative bg-green-500 w-2 h-2 rounded-full"></div></div>
                <span class="font-mono text-cyan-400 tracking-widest uppercase">CRIPTOGRAFIA MILITAR ATIVA</span>
            </div>
        </div>
        <div id="productGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
    </main>

    <div id="cart-handle" onclick="toggleCarrinho()">
        <i class="fas fa-shopping-cart mb-2"></i> VER SACOLA
    </div>

    <div id="painel-carrinho" class="fixed top-0 right-0 w-full sm:w-[450px] h-full glass-panel bg-[#050505]/98 z-[100] transform translate-x-full transition-transform duration-300 flex flex-col border-l border-white/10">
        <div class="p-6 border-b border-white/10 flex justify-between items-center">
            <h2 class="text-xl font-bold uppercase tracking-tighter">SUA <span class="amazon-orange">SACOLA</span></h2>
            <button onclick="toggleCarrinho()" class="text-gray-400 hover:text-white p-2"><i class="fas fa-times text-xl"></i></button>
        </div>

        <div id="itens-carrinho" class="flex-1 overflow-y-auto p-4 space-y-4 no-scrollbar"></div>

        <div class="p-6 bg-black/80 border-t border-white/10 space-y-3">
            <div class="space-y-2 bg-white/5 p-3 rounded-lg border border-white/5">
                <input type="text" id="cli-nome" placeholder="Nome Completo" class="w-full bg-black/40 border border-white/10 rounded p-2 text-sm outline-none focus:border-orange-500">
                <input type="tel" id="cli-whats" placeholder="WhatsApp (DDD)" class="w-full bg-black/40 border border-white/10 rounded p-2 text-sm outline-none focus:border-orange-500">
                <div class="flex gap-2">
                    <input type="text" id="cli-cep" placeholder="CEP" maxlength="9" class="w-1/3 bg-white/10 border border-cyan-500/30 rounded p-2 text-sm text-cyan-400 font-bold outline-none">
                    <input type="text" id="cli-rua" placeholder="Endereço Automático" class="w-2/3 bg-black/20 border border-white/10 rounded p-2 text-[10px] text-gray-400" readonly>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-2">
                <button onclick="selecionarPag('Pix')" id="btn-pag-pix" class="p-2 rounded border border-white/10 bg-white/5 text-[10px] font-bold">PIX</button>
                <button onclick="selecionarPag('Cartao')" id="btn-pag-card" class="p-2 rounded border border-white/10 bg-white/5 text-[10px] font-bold">CARTÃO</button>
            </div>

            <div class="flex justify-between font-bold text-lg border-t border-white/5 pt-2">
                <span class="text-xs uppercase">Total:</span>
                <span id="total-carrinho" class="text-orange-400 font-black">R$ 0,00</span>
            </div>

            <button onclick="finalizarParaVendedor()" id="btn-finalizar" class="w-full bg-amazon-orange text-black font-black py-4 rounded hover:bg-orange-500 transition uppercase text-sm">
                Finalizar Pedido Seguro
            </button>
        </div>
    </div>

    <script>
        // SEGURANÇA MILITAR ANTI-CÓPIA
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.onkeydown = function(e) {
            if (e.keyCode == 123 || 
                (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74 || e.keyCode == 67)) || 
                (e.ctrlKey && (e.keyCode == 85 || e.keyCode == 83))) {
                return false;
            }
        };

        const BOT_TOKEN = 'SEU_TOKEN_AQUI';
        const CHAT_ID = 'SEU_CHAT_ID_AQUI';

        const db_estoque = [
            { id: 101, nome: "Parafuso Sextavado Aço 8.8", preco: 145.90, img: "https://via.placeholder.com/200", loja: "Atacadão Ferragens" },
            { id: 102, nome: "Dashboard Performance SandxCDD", preco: 597.00, img: "https://via.placeholder.com/200", loja: "Digital Solutions" },
            { id: 103, nome: "Kit Brocas Profissional", preco: 89.90, img: "https://via.placeholder.com/200", loja: "Loja Parceira" },
            { id: 104, nome: "Painel LED Industrial 60W", preco: 210.00, img: "https://via.placeholder.com/200", loja: "Rei do LED" }
        ];

        let sacola = JSON.parse(localStorage.getItem('sandx_cart')) || [];
        let metodoSelecionado = "";

        async function autoLoc() {
            try {
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();
                if(data.city) document.getElementById('loc-display').innerHTML = `<i class="fas fa-satellite"></i> ${data.city} - ${data.region_code}`;
            } catch (e) { console.log("Offline"); }
        }

        window.onload = () => {
            renderizar(db_estoque);
            atualizarCarrinho();
            configurarMascaras();
            autoLoc();
            if(sacola.length > 0) toggleCarrinho(); // Abre a sacola se já houver itens
        };

        function renderizar(lista) {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = lista.map(p => `
                <div class="amazon-card glass-panel rounded-lg overflow-hidden flex flex-col group">
                    <div class="bg-white h-40 flex items-center justify-center p-4">
                        <img src="${p.img}" class="max-h-full mix-blend-multiply group-hover:scale-110 transition-transform duration-500">
                    </div>
                    <div class="p-4 flex-1 flex flex-col">
                        <h3 class="font-bold text-xs mb-2">${p.nome}</h3>
                        <div class="text-lg font-black mb-4">R$ ${p.preco.toLocaleString('pt-br', {minimumFractionDigits: 2})}</div>
                        <button onclick="addSacola(${p.id})" class="mt-auto bg-amazon-orange text-black font-bold py-2 rounded text-[10px] uppercase">Comprar</button>
                    </div>
                </div>
            `).join('');
        }

        function addSacola(id) {
            const item = db_estoque.find(p => p.id === id);
            sacola.push({ ...item, uniqueId: Date.now() });
            salvarSincronizar();
            document.getElementById('painel-carrinho').classList.remove('translate-x-full');
            document.getElementById('cart-handle').classList.add('hidden');
        }

        function toggleCarrinho() {
            const p = document.getElementById('painel-carrinho');
            const h = document.getElementById('cart-handle');
            p.classList.toggle('translate-x-full');
            if(p.classList.contains('translate-x-full')) h.classList.remove('hidden');
            else h.classList.add('hidden');
        }

        function removerItem(uniqueId) {
            sacola = sacola.filter(i => i.uniqueId !== uniqueId);
            salvarSincronizar();
        }

        function salvarSincronizar() {
            localStorage.setItem('sandx_cart', JSON.stringify(sacola));
            atualizarCarrinho();
        }

        function atualizarCarrinho() {
            const container = document.getElementById('itens-carrinho');
            let total = 0;
            if(sacola.length === 0) {
                container.innerHTML = `<div class="text-center py-10 opacity-30 text-[10px] uppercase">Vazio</div>`;
            } else {
                container.innerHTML = sacola.map(item => {
                    total += item.preco;
                    return `<div class="flex gap-3 border-b border-white/5 pb-2 items-center">
                        <img src="${item.img}" class="w-8 h-8 bg-white rounded">
                        <div class="flex-1 text-[10px]">
                            <div class="font-bold">${item.nome}</div>
                            <div class="text-orange-400">R$ ${item.preco.toFixed(2)}</div>
                        </div>
                        <button onclick="removerItem(${item.uniqueId})" class="text-red-500 p-2"><i class="fas fa-trash-alt text-[10px]"></i></button>
                    </div>`;
                }).join('');
            }
            document.getElementById('total-carrinho').innerText = `R$ ${total.toLocaleString('pt-br', {minimumFractionDigits: 2})}`;
        }

        function configurarMascaras() {
            const whatsInput = document.getElementById('cli-whats');
            whatsInput.oninput = (e) => {
                let x = e.target.value.replace(/\D/g, '').match(/(\d{0,2})(\d{0,5})(\d{0,4})/);
                e.target.value = !x[2] ? x[1] : '(' + x[1] + ') ' + x[2] + (x[3] ? '-' + x[3] : '');
            };
            const cepInput = document.getElementById('cli-cep');
            cepInput.oninput = (e) => {
                let v = e.target.value.replace(/\D/g, '');
                if (v.length > 5) v = v.slice(0, 5) + '-' + v.slice(5, 8);
                e.target.value = v;
                if(v.length === 9) buscarCEP(v);
            };
        }

        async function buscarCEP(cep) {
            try {
                const res = await fetch(`https://viacep.com.br/ws/${cep.replace('-','')}/json/`);
                const data = await res.json();
                if (!data.erro) document.getElementById('cli-rua').value = `${data.logradouro}, ${data.bairro} - ${data.localidade}/${data.uf}`;
            } catch (e) {}
        }

        function selecionarPag(metodo) {
            metodoSelecionado = metodo;
            document.getElementById('btn-pag-pix').style.borderColor = metodo === 'Pix' ? '#ff9900' : '';
            document.getElementById('btn-pag-card').style.borderColor = metodo === 'Cartao' ? '#ff9900' : '';
        }

        function filtrarProdutos() {
            const query = document.getElementById('mainSearch').value.toLowerCase();
            renderizar(db_estoque.filter(p => p.nome.toLowerCase().includes(query)));
        }

        async function finalizarParaVendedor() {
            const dados = {
                nome: document.getElementById('cli-nome').value,
                whats: document.getElementById('cli-whats').value,
                rua: document.getElementById('cli-rua').value,
                pag: metodoSelecionado
            };
            if(!dados.nome || !dados.whats || !dados.rua || !dados.pag || sacola.length === 0) return alert("⚠️ Preencha tudo.");
            
            const btn = document.getElementById('btn-finalizar');
            btn.innerHTML = 'ENVIANDO...';
            btn.disabled = true;

            const itensTxt = sacola.map(i => `• ${i.nome} (R$ ${i.preco.toFixed(2)})`).join('%0A');
            const total = document.getElementById('total-carrinho').innerText;
            const msg = `🛡️ *NOVO PEDIDO*%0A👤 *Cliente:* ${dados.nome}%0A📱 *WhatsApp:* ${dados.whats}%0A📍 *Entrega:* ${dados.rua}%0A🛒 *Itens:*%0A${itensTxt}%0A💳 *Pagamento:* ${dados.pag}%0A💰 *Total:* ${total}`;

            try {
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${msg}&parse_mode=Markdown`);
                if(response.ok) {
                    alert("✅ PEDIDO RECEBIDO!");
                    sacola = []; salvarSincronizar(); location.reload();
                }
            } catch (error) { alert("⚠️ Erro."); }
            finally { btn.innerHTML = 'Finalizar Pedido Seguro'; btn.disabled = false; }
        }
    </script>
</body>
</html>
