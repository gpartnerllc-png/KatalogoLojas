<!DOCTYPE html>
<html lang="pt-br" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grupo | Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { 
            color: #ededed; font-family: 'Inter', sans-serif;
            background-color: #050505;
            background-image: radial-gradient(circle at 50% 0%, #102a43 0%, #050505 70%);
            background-attachment: fixed;
            -webkit-user-select: none; user-select: none;
        }
        input, textarea { -webkit-user-select: auto; user-select: auto; }
        
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .amazon-orange { color: #ff9900; }
        .bg-amazon-orange { background-color: #ff9900; }
        .amazon-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .amazon-card:hover { transform: translateY(-5px); border-color: rgba(8, 145, 178, 0.4); }
        
        /* Ajuste do Scroll da Sacola */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        #itens-carrinho { max-height: 25vh; overflow-y: auto; }

        #btn-finalizar { position: relative; overflow: hidden; }
        #btn-finalizar::after {
            content: ""; position: absolute; top: -50%; left: -100%; width: 100%; height: 200%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transform: rotate(20deg); animation: shine 4s infinite;
        }
        @keyframes shine { 0% { left: -100%; } 20% { left: 100%; } 100% { left: 100%; } }
    </style>
</head>
<body class="min-h-screen overflow-x-hidden">

    <header class="fixed top-0 left-0 w-full z-50 glass-panel bg-[#050505]/90 border-b border-white/10">
        <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between gap-4">
            <a href="#" class="text-xl font-bold tracking-tighter">GRUPO<span class="amazon-orange">APOIO</span></a>
            
            <div class="hidden md:flex flex-col text-xs leading-tight">
                <span class="text-gray-400 italic">Localização via Satélite</span>
                <span id="loc-display" class="font-bold text-cyan-400"><i class="fas fa-satellite"></i> Sincronizando...</span>
            </div>

            <div class="flex-1 max-w-2xl relative">
                <div class="flex">
                    <input type="text" id="mainSearch" onkeyup="filtrarProdutos()" placeholder="Buscar..." 
                    class="w-full bg-white text-black px-4 py-2 rounded-l-md outline-none focus:ring-2 focus:ring-orange-500">
                    <button class="bg-amazon-orange px-5 rounded-r-md"><i class="fas fa-search text-black"></i></button>
                </div>
            </div>

            <button onclick="toggleCarrinho()" class="relative flex items-center gap-2">
                <i class="fas fa-shopping-cart text-2xl"></i>
                <span id="cart-count" class="absolute -top-2 -right-2 bg-orange-600 text-white text-[10px] px-2 py-0.5 rounded-full">0</span>
            </button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 mt-24">
        <div id="productGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
    </main>

    <div id="painel-carrinho" class="fixed top-0 right-0 w-full sm:w-[420px] h-full glass-panel bg-[#050505]/98 z-[100] transform translate-x-full transition-transform duration-300 flex flex-col border-l border-white/10 shadow-2xl">
        
        <div class="p-5 border-b border-white/10 flex justify-between items-center">
            <h2 class="text-lg font-bold uppercase italic tracking-tighter">Sua <span class="amazon-orange">Sacola</span></h2>
            <button onclick="toggleCarrinho()" class="text-gray-400 hover:text-white p-2"><i class="fas fa-times text-xl"></i></button>
        </div>

        <div id="itens-carrinho" class="p-4 space-y-3 no-scrollbar"></div>

        <div class="flex-1 overflow-y-auto p-5 space-y-4 bg-black/40">
            <div class="space-y-3">
                <div class="flex justify-between items-center">
                    <p class="text-[10px] text-cyan-400 uppercase tracking-widest font-bold">
                        <i class="fas fa-shield-alt mr-1"></i> Auditoria Real-Time
                    </p>
                    <div id="live-clock-checkout" class="text-[9px] font-mono text-white/50"></div>
                </div>

                <div class="grid grid-cols-1 gap-2">
                    <input type="text" id="cli-nome" placeholder="Nome Completo" class="w-full bg-black/60 border border-white/10 rounded-lg p-2.5 text-sm outline-none focus:border-orange-500">
                    <input type="tel" id="cli-whats" placeholder="WhatsApp (61) 99999-9999" class="w-full bg-black/60 border border-white/10 rounded-lg p-2.5 text-sm outline-none focus:border-orange-500">
                </div>
                
                <div id="sat-map-container" class="w-full h-24 rounded-lg bg-black border border-white/5 overflow-hidden relative">
                    <iframe id="google-map-iframe" class="w-full h-full grayscale opacity-60" frameborder="0" src="about:blank"></iframe>
                    <div class="absolute top-1 left-1 bg-black/80 px-2 py-0.5 rounded text-[7px] text-cyan-400 border border-cyan-500/30">
                        <i class="fas fa-crosshairs animate-pulse"></i> SINAL_ATIVO
                    </div>
                </div>

                <div class="flex gap-2">
                    <input type="text" id="cli-cep" placeholder="CEP" maxlength="9" class="w-1/3 bg-white/5 border border-cyan-500/40 rounded-lg p-2 text-xs text-cyan-400 font-bold outline-none">
                    <input type="text" id="cli-rua" placeholder="Endereço..." class="w-2/3 bg-black/40 border border-white/10 rounded-lg p-2 text-[10px] text-gray-500" readonly>
                </div>

                <div class="grid grid-cols-2 gap-2">
                    <button onclick="selecionarPag('Pix')" id="btn-pag-pix" class="flex flex-col items-center gap-1 p-2 rounded-xl border border-white/10 bg-white/5 hover:border-green-500 transition-all">
                        <i class="fab fa-pix text-green-400"></i> <span class="text-[9px] font-bold">PIX</span>
                    </button>
                    <button onclick="selecionarPag('Cartao')" id="btn-pag-card" class="flex flex-col items-center gap-1 p-2 rounded-xl border border-white/10 bg-white/5 hover:border-blue-500 transition-all">
                        <i class="fas fa-credit-card text-blue-400"></i> <span class="text-[9px] font-bold">CARTÃO</span>
                    </button>
                </div>
            </div>
        </div>

        <div class="p-5 border-t border-white/10 bg-[#050505]">
            <div class="flex justify-between font-bold mb-4">
                <span class="text-xs text-gray-400 uppercase">Total:</span>
                <span id="total-carrinho" class="text-orange-400 text-xl font-black">R$ 0,00</span>
            </div>
            <button onclick="finalizarParaVendedor()" id="btn-finalizar" class="w-full bg-amazon-orange text-black font-black py-4 rounded-lg hover:bg-orange-500 transition uppercase text-sm shadow-lg">
                Finalizar Pedido Seguro
            </button>
        </div>
    </div>

    <script>
        const db_estoque = [
            { id: 101, nome: "Parafuso Sextavado Aço 8.8", preco: 145.90, img: "https://images.tcdn.com.br/img/editor/up/694503/parafuso.png", loja: "Atacadão Ferragens" },
            { id: 102, nome: "Dashboard Performance ", preco: 597.00, img: "https://cdn-icons-png.flaticon.com/512/2103/2103633.png", loja: "Digital Solutions" },
            { id: 103, nome: "Kit Brocas Profissional", preco: 89.90, img: "https://images.tcdn.com.br/img/editor/up/694503/brocas.png", loja: "Loja Parceira" },
            { id: 104, nome: "Painel LED Industrial 60W", preco: 210.00, img: "https://cdn-icons-png.flaticon.com/512/3159/3159480.png", loja: "Rei do LED" }
        ];

        let sacola = JSON.parse(localStorage.getItem('apoio_cart')) || [];
        let metodoSelecionado = "";

        window.onload = () => { renderizar(db_estoque); atualizarCarrinho(); configurarMascaras(); };

        function renderizar(lista) {
            document.getElementById('productGrid').innerHTML = lista.map(p => `
                <div class="amazon-card glass-panel rounded-lg overflow-hidden flex flex-col p-4">
                    <div class="bg-white rounded-lg h-40 flex items-center justify-center mb-4"><img src="${p.img}" class="max-h-32"></div>
                    <p class="text-[9px] text-cyan-400 font-mono">${p.loja}</p>
                    <h3 class="font-bold text-sm mb-2 h-10">${p.nome}</h3>
                    <div class="text-lg font-black mb-4">R$ ${p.preco.toFixed(2)}</div>
                    <button onclick="addSacola(${p.id})" class="bg-amazon-orange text-black font-bold py-2 rounded text-xs">Adicionar</button>
                </div>`).join('');
        }

        function addSacola(id) {
            const item = db_estoque.find(p => p.id === id);
            sacola.push({ ...item, uniqueId: Date.now() });
            atualizarCarrinho();
            document.getElementById('painel-carrinho').classList.remove('translate-x-full');
        }

        function atualizarCarrinho() {
            document.getElementById('cart-count').innerText = sacola.length;
            let total = 0;
            const container = document.getElementById('itens-carrinho');
            
            if(sacola.length === 0) {
                container.innerHTML = `<p class="text-center text-xs opacity-40">Sacola Vazia</p>`;
            } else {
                container.innerHTML = sacola.map(item => {
                    total += item.preco;
                    return `<div class="flex gap-3 bg-white/5 p-2 rounded-lg border border-white/5 items-center">
                        <img src="${item.img}" class="w-8 h-8 bg-white rounded">
                        <div class="flex-1 text-[10px] font-bold truncate">${item.nome}</div>
                        <button onclick="removerItem(${item.uniqueId})" class="text-red-500 px-2"><i class="fas fa-trash"></i></button>
                    </div>`;
                }).join('');
            }
            document.getElementById('total-carrinho').innerText = `R$ ${total.toFixed(2)}`;
            localStorage.setItem('sandx_cart', JSON.stringify(sacola));
        }

        function removerItem(uid) {
            sacola = sacola.filter(i => i.uniqueId !== uid);
            atualizarCarrinho();
        }

        function configurarMascaras() {
            const cepInput = document.getElementById('cli-cep');
            cepInput.addEventListener('input', async (e) => {
                let v = e.target.value.replace(/\D/g, '');
                if (v.length > 5) v = v.slice(0, 5) + '-' + v.slice(5, 8);
                e.target.value = v;
                if(v.length === 9) {
                    const res = await fetch(`https://viacep.com.br/ws/${v.replace('-','')}/json/`);
                    const data = await res.json();
                    if(!data.erro) {
                        document.getElementById('cli-rua').value = `${data.logradouro}, ${data.bairro} - ${data.localidade}`;
                        document.getElementById('google-map-iframe').src = `https://maps.google.com/maps?q=${data.localidade}&t=k&z=15&output=embed`;
                    }
                }
            });
        }

        function selecionarPag(m) {
            metodoSelecionado = m;
            document.getElementById('btn-pag-pix').style.borderColor = m === 'Pix' ? '#22c55e' : '';
            document.getElementById('btn-pag-card').style.borderColor = m === 'Cartao' ? '#3b82f6' : '';
        }

        function toggleCarrinho() { document.getElementById('painel-carrinho').classList.toggle('translate-x-full'); }
        
        function filtrarProdutos() {
            const q = document.getElementById('mainSearch').value.toLowerCase();
            renderizar(db_estoque.filter(p => p.nome.toLowerCase().includes(q)));
        }

        async function finalizarParaVendedor() {
            if(!metodoSelecionado || sacola.length === 0 || !document.getElementById('cli-nome').value) return alert("Preencha os dados e escolha o pagamento!");
            alert("✅ Pedido enviado com sucesso via auditoria SandxCDD!");
            sacola = []; atualizarCarrinho(); toggleCarrinho();
        }
    </script>
</body>
</html>
