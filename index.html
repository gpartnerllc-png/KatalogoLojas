<!DOCTYPE html>
<html lang="pt-br" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grupo | Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { 
            color: #ededed; font-family: 'Inter', sans-serif;
            background-color: #050505;
            background-image: radial-gradient(circle at 50% 0%, #102a43 0%, #050505 70%);
            background-attachment: fixed;
            -webkit-user-select: none; user-select: none;
        }
        input, textarea { -webkit-user-select: auto; user-select: auto; }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .amazon-orange { color: #ff9900; }
        .bg-amazon-orange { background-color: #ff9900; }
        .amazon-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); animation: fadeIn 0.5s ease-out; }
        .amazon-card:hover { transform: translateY(-5px); border-color: rgba(8, 145, 178, 0.4); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        #btn-finalizar { position: relative; overflow: hidden; }
        #btn-finalizar::after {
            content: ""; position: absolute; top: -50%; left: -100%; width: 100%; height: 200%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transform: rotate(20deg); animation: shine 4s infinite;
        }
        @keyframes shine { 0% { left: -100%; } 20% { left: 100%; } 100% { left: 100%; } }
        @media print { body { display:none; } }
    </style>
</head>
<body class="min-h-screen overflow-x-hidden">

    <header class="fixed top-0 left-0 w-full z-50 glass-panel bg-[#050505]/90 border-b border-white/10">
        <div class="max-w-7xl mx-auto px-4 py-2 flex items-center justify-between gap-4">
            <a href="#" class="text-xl font-bold tracking-tighter">GRUPO<span class="amazon-orange">APOIO</span></a>
            
            <div class="hidden md:flex flex-col text-[10px] leading-tight">
                <span class="text-gray-400 italic">Satélite Status</span>
                <span id="loc-display" class="font-bold text-cyan-400 uppercase tracking-tighter italic">Sincronizando...</span>
            </div>

            <div class="flex-1 max-w-xl relative">
                <div class="flex">
                    <input type="text" id="mainSearch" onkeyup="filtrarProdutos()" placeholder="Pesquisar..." 
                    class="w-full bg-white text-black px-4 py-1.5 rounded-l-md outline-none text-sm">
                    <button class="bg-amazon-orange px-4 rounded-r-md"><i class="fas fa-search text-black"></i></button>
                </div>
            </div>

            <button onclick="toggleCarrinho()" class="relative flex items-center gap-2 hover:text-orange-400 transition">
                <i class="fas fa-shopping-cart text-xl"></i>
                <span id="cart-count" class="absolute -top-2 -right-2 bg-orange-600 text-white text-[9px] font-bold px-1.5 rounded-full">0</span>
            </button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 mt-20 pb-10">
        <div id="rtk-status" class="glass-panel p-2 rounded-lg mb-6 border-cyan-500/20 flex items-center justify-between text-[11px]">
            <div class="flex items-center gap-2 font-mono text-cyan-400">
                <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div> SINAL ATIVO
            </div>
            <div class="text-gray-500">Auditoria SandxCDD: <span id="header-clock" class="text-white">00:00:00</span></div>
        </div>
        <div id="productGrid" class="grid grid-cols-2 lg:grid-cols-4 gap-4"></div>
    </main>

    <div id="painel-carrinho" class="fixed top-0 right-0 w-full sm:w-[380px] h-full glass-panel bg-[#050505]/98 z-[100] transform translate-x-full transition-transform duration-300 flex flex-col border-l border-white/10">
        <div class="p-4 border-b border-white/10 flex justify-between items-center">
            <h2 class="text-lg font-bold uppercase tracking-tighter">Sua <span class="amazon-orange">Sacola</span></h2>
            <button onclick="toggleCarrinho()" class="text-gray-400 hover:text-white"><i class="fas fa-times"></i></button>
        </div>

        <div id="itens-carrinho" class="flex-1 overflow-y-auto p-3 space-y-2 no-scrollbar"></div>

        <div class="p-4 bg-black/60 border-t border-white/10 space-y-3">
            <div id="checkout-detalhado" class="p-3 space-y-2 bg-white/5 rounded-lg border border-white/5">
                <div class="flex justify-between items-center mb-1">
                    <p class="text-[9px] text-cyan-400 uppercase font-bold tracking-widest"><i class="fas fa-clock mr-1"></i> <span id="live-clock-checkout">--/--/-- 00:00:00</span></p>
                </div>

                <input type="text" id="cli-nome" placeholder="Nome Completo" class="w-full bg-black/40 border border-white/10 rounded p-1.5 text-xs outline-none focus:border-orange-500">
                <input type="tel" id="cli-whats" placeholder="WhatsApp" class="w-full bg-black/40 border border-white/10 rounded p-1.5 text-xs outline-none">
                
                <div id="sat-map-container" class="w-full h-24 rounded bg-black border border-white/5 overflow-hidden relative">
                    <iframe id="google-map-iframe" class="w-full h-full grayscale opacity-50" frameborder="0" src="about:blank"></iframe>
                </div>

                <div class="flex gap-2">
                    <input type="text" id="cli-cep" placeholder="CEP" maxlength="9" class="w-1/3 bg-white/10 border border-cyan-500/30 rounded p-1.5 text-xs text-cyan-400 font-bold outline-none">
                    <input type="text" id="cli-rua" placeholder="Endereço" class="w-2/3 bg-black/20 border border-white/10 rounded p-1.5 text-[9px] text-gray-400" readonly>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-2">
                <button onclick="selecionarPag('Pix')" id="btn-pag-pix" class="flex items-center justify-center gap-1 p-2 rounded border border-white/10 bg-white/5 transition-all">
                    <i class="fab fa-pix text-green-400 text-xs"></i> <span class="text-[9px] font-bold">PIX</span>
                </button>
                <button onclick="selecionarPag('Cartao')" id="btn-pag-card" class="flex items-center justify-center gap-1 p-2 rounded border border-white/10 bg-white/5 transition-all">
                    <i class="fas fa-credit-card text-blue-400 text-xs"></i> <span class="text-[9px] font-bold">CARTÃO</span>
                </button>
            </div>

            <div class="flex justify-between font-bold text-base pt-1">
                <span class="text-xs">Subtotal:</span>
                <span id="total-carrinho" class="text-orange-400">R$ 0,00</span>
            </div>

            <button onclick="finalizarParaVendedor()" id="btn-finalizar" class="w-full bg-amazon-orange text-black font-black py-3 rounded text-xs uppercase shadow-lg">
                Finalizar Pedido Seguro
            </button>
        </div>
    </div>

    <script>
        const BOT_TOKEN = 'SEU_TOKEN'; 
        const CHAT_ID = 'SEU_ID';

        const db_estoque = [
            { id: 101, nome: "Parafuso Sextavado Aço 8.8", preco: 145.90, img: "https://via.placeholder.com/200", loja: "Atacadão" },
            { id: 102, nome: "Dashboard SandxCDD", preco: 597.00, img: "https://via.placeholder.com/200", loja: "Digital" },
            { id: 104, nome: "Painel LED Industrial 60W", preco: 210.00, img: "https://via.placeholder.com/200", loja: "Rei do LED" }
        ];

        let sacola = JSON.parse(localStorage.getItem('sandx_cart')) || [];
        let metodoSelecionado = "";

        // === AUTOMÁTICOS (HORA E LOCALIZAÇÃO) ===
        function startRelogios() {
            setInterval(() => {
                const agora = new Date();
                const time = agora.toLocaleTimeString('pt-BR');
                const date = agora.toLocaleDateString('pt-BR');
                document.getElementById('header-clock').innerText = time;
                document.getElementById('live-clock-checkout').innerText = `${date} ${time}`;
            }, 1000);
        }

        async function autoLoc() {
            try {
                const res = await fetch('https://ipapi.co/json/');
                const data = await res.json();
                if(data.city) {
                    const local = `${data.city} - ${data.region_code}`;
                    document.getElementById('loc-display').innerText = local;
                }
            } catch (e) { console.log("Satélite em busca..."); }
        }

        // === LÓGICA DO CARRINHO (COMPACTA) ===
        function atualizarCarrinho() {
            document.getElementById('cart-count').innerText = sacola.length;
            const container = document.getElementById('itens-carrinho');
            let total = 0;
            
            container.innerHTML = sacola.length === 0 ? 
                '<p class="text-center py-10 opacity-20 text-[10px]">VAZIO</p>' :
                sacola.map(item => {
                    total += item.preco;
                    return `
                        <div class="flex gap-3 bg-white/5 p-2 rounded items-center">
                            <img src="${item.img}" class="w-8 h-8 rounded bg-white object-contain">
                            <div class="flex-1 min-w-0">
                                <p class="text-[9px] font-bold truncate uppercase">${item.nome}</p>
                                <p class="text-orange-400 text-[10px]">R$ ${item.preco.toFixed(2)}</p>
                            </div>
                            <button onclick="removerItem(${item.uniqueId})" class="text-gray-600 hover:text-red-500"><i class="fas fa-trash text-[10px]"></i></button>
                        </div>
                    `;
                }).join('');
            
            document.getElementById('total-carrinho').innerText = `R$ ${total.toLocaleString('pt-br', {minimumFractionDigits: 2})}`;
            localStorage.setItem('sandx_cart', JSON.stringify(sacola));
        }

        function addSacola(id) {
            const p = db_estoque.find(x => x.id === id);
            sacola.push({...p, uniqueId: Date.now() + Math.random()});
            atualizarCarrinho();
            document.getElementById('painel-carrinho').classList.remove('translate-x-full');
        }

        function removerItem(uid) {
            sacola = sacola.filter(i => i.uniqueId !== uid);
            atualizarCarrinho();
        }

        function selecionarPag(m) {
            metodoSelecionado = m;
            document.getElementById('btn-pag-pix').style.borderColor = m === 'Pix' ? '#22c55e' : 'rgba(255,255,255,0.1)';
            document.getElementById('btn-pag-card').style.borderColor = m === 'Cartao' ? '#3b82f6' : 'rgba(255,255,255,0.1)';
        }

        // === CEP AUTOMÁTICO & MAPA ===
        document.getElementById('cli-cep').addEventListener('input', async (e) => {
            let v = e.target.value.replace(/\D/g, '');
            if (v.length > 5) v = v.slice(0, 5) + '-' + v.slice(5, 8);
            e.target.value = v;
            if(v.length === 9) {
                const res = await fetch(`https://viacep.com.br/ws/${v.replace('-','')}/json/`);
                const d = await res.json();
                if(!d.erro) {
                    const end = `${d.logradouro}, ${d.bairro} - ${d.localidade}/${d.uf}`;
                    document.getElementById('cli-rua').value = end;
                    document.getElementById('google-map-iframe').src = `https://maps.google.com/maps?q=${encodeURIComponent(end)}&t=k&z=17&output=embed&iwloc=near`;
                }
            }
        });

        // === FINALIZAÇÃO & SEGURANÇA ===
        async function finalizarParaVendedor() {
            const nome = document.getElementById('cli-nome').value;
            if(!nome || !metodoSelecionado || sacola.length === 0) return alert("⚠️ Dados incompletos.");
            
            const btn = document.getElementById('btn-finalizar');
            btn.innerHTML = "ENVIANDO...";
            
            const msg = `🛡️ *PEDIDO GRUPO APOIO*%0A👤: ${nome}%0A💳: ${metodoSelecionado}%0A💰: ${document.getElementById('total-carrinho').innerText}`;
            
            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${msg}&parse_mode=Markdown`);
                alert("✅ SUCESSO!");
                sacola = []; atualizarCarrinho(); location.reload();
            } catch (e) { alert("Erro de Rede"); }
        }

        function renderizar(lista) {
            document.getElementById('productGrid').innerHTML = lista.map(p => `
                <div class="amazon-card glass-panel rounded overflow-hidden flex flex-col group p-2">
                    <div class="bg-white h-32 rounded flex items-center justify-center mb-2">
                        <img src="${p.img}" class="max-h-24 mix-blend-multiply group-hover:scale-105 transition">
                    </div>
                    <p class="text-[8px] text-cyan-500 font-mono">${p.loja}</p>
                    <h3 class="font-bold text-[10px] h-8 leading-tight mb-1">${p.nome}</h3>
                    <div class="text-sm font-black mb-2">R$ ${p.preco.toFixed(2)}</div>
                    <button onclick="addSacola(${p.id})" class="bg-amazon-orange text-black font-bold py-1.5 rounded text-[9px] uppercase">Comprar</button>
                </div>
            `).join('');
        }

        function toggleCarrinho() { document.getElementById('painel-carrinho').classList.toggle('translate-x-full'); }
        function filtrarProdutos() {
            const q = document.getElementById('mainSearch').value.toLowerCase();
            renderizar(db_estoque.filter(p => p.nome.toLowerCase().includes(q)));
        }

        // BLOQUEIOS DE SEGURANÇA
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.onkeydown = e => { if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74))) return false; };

        window.onload = () => { renderizar(db_estoque); atualizarCarrinho(); startRelogios(); autoLoc(); };
    </script>
</body>
</html>
