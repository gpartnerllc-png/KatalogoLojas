<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grupo | APOIO</title>
    <link href="https://fonts.googleapis.com/css2?family=Amazon+Ember:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --amazon-navy: #131921;
            --amazon-light-navy: #232f3e;
            --amazon-orange: #febd69;
            --amazon-button: #ffd814;
            --amazon-button-hover: #f7ca00;
            --bg-gray: #eaeded;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial', sans-serif; }

        body { background-color: var(--bg-gray); color: #0f1111; }

        /* HEADER AMAZON STYLE */
        header { background-color: var(--amazon-navy); color: white; padding: 10px 20px; }
        
        .nav-main { display: flex; align-items: center; justify-content: space-between; max-width: 1500px; margin: 0 auto; }

        .logo { font-size: 1.5rem; font-weight: bold; color: white; text-decoration: none; padding: 10px; border: 1px solid transparent; }
        .logo span { color: var(--amazon-orange); }

        .search-bar { flex-grow: 1; display: flex; margin: 0 20px; height: 40px; }
        .search-bar input { flex-grow: 1; border: none; border-radius: 4px 0 0 4px; padding: 0 10px; font-size: 1rem; }
        .search-bar button { background-color: var(--amazon-orange); border: none; width: 45px; border-radius: 0 4px 4px 0; cursor: pointer; }

        /* GRID DE PRODUTOS */
        .container { max-width: 1500px; margin: 20px auto; padding: 0 15px; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }

        .product-card { background: white; padding: 20px; border-radius: 2px; display: flex; flex-direction: column; justify-content: space-between; }
        
        .product-card h2 { font-size: 1.3rem; margin-bottom: 10px; color: #0f1111; }

        .image-box { width: 100%; height: 200px; background: #f7f7f7; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; }
        .image-box img { max-width: 100%; max-height: 100%; mix-blend-mode: multiply; }

        .price-tag { font-size: 0.8rem; margin-bottom: 10px; }
        .price-tag b { font-size: 1.8rem; }
        .price-tag sup { font-size: 0.9rem; top: -0.5em; }

        .btn-amazon {
            background-color: var(--amazon-button);
            border: 1px solid #fcd200;
            border-radius: 20px;
            padding: 8px;
            cursor: pointer;
            width: 100%;
            font-size: 0.9rem;
            box-shadow: 0 2px 5px rgba(213,217,217,.5);
        }

        .btn-amazon:hover { background-color: var(--amazon-button-hover); }

        /* FOOTER */
        footer { background-color: var(--amazon-light-navy); color: white; text-align: center; padding: 40px 0; margin-top: 50px; }
    </style>
</head>
<body>

<header>
    <div class="nav-main">
        <a href="#" class="logo">Grupo<span>APOIO</span></a>
        <div class="search-bar">
            <input type="text" placeholder="Pesquisar produtos e serviços de performance...">
            <button>🔍</button>
        </div>
        <div style="font-size: 0.8rem; padding: 10px;">
            Olá, Cristian<br><b>Contas e Listas</b>
        </div>
    </div>
</header>

<div class="container">
    <div class="product-card">
        <h2>GRUPO APOIO PRODUTOS</h2>
        <div class="image-box">
            <img src="https://via.placeholder.com/200" alt="7X Ultra">
        </div>
        <div>
            <div class="price-tag">R$ <sup>R$</sup><b>597</b><sup>,00</sup></div>
            <button class="btn-amazon" onclick="enviarPedido('Dashboard 7X Ultra')">Comprar agora</button>
        </div>
    </div>

    <div class="product-card">
        <h2>Consultoria (ME)</h2>
        <div class="image-box">
            <img src="https://via.placeholder.com/200" alt="Consultoria">
        </div>
        <div>
            <div class="price-tag">R$ <sup>R$</sup><b>1.200</b><sup>,00</sup></div>
            <button class="btn-amazon" onclick="enviarPedido('Consultoria SandxCDD')">Comprar agora</button>
        </div>
    </div>
</div>

<footer>
    <p>Condições de Uso | Aviso de Privacidade | SandxCDD &copy; 2026</p>
</footer>

<script>
    // Lógica para direcionar ao Telegram (Seu Bot)
    function enviarPedido(item) {
        const BOT_TOKEN = "SEU_BOT_TOKEN"; // Altere aqui
        const CHAT_ID = "SEU_CHAT_ID";     // Altere aqui
        const msg = `📦 *Novo Pedido Amazon-Style*\n\nO cliente solicitou: *${item}*\n\n_Aguardando contato para finalizar pagamento._`;

        const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`;

        fetch(url).then(res => {
            if(res.ok) alert("Pedido enviado ao sistema central!");
        });
    }
</script>

</body>
</html>
